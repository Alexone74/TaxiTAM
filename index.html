<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Esame al Ruolo Conducenti</title>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        // Logging per debug
        console.log('Document loaded');
        window.addEventListener('DOMContentLoaded', (event) => {
            console.log('DOM fully loaded');
        });
        window.addEventListener('load', (event) => {
            console.log('Page fully loaded');
        });
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel" data-type="module">
        // Logging per verificare che Babel funzioni
        console.log('Babel script starting');
        
        const { useState, useEffect } = React;
        const { 
            BookOpen, 
            Home,
            Award,
            ArrowRight,
            Play,
            RefreshCw,
            CheckCircle,
            XCircle
        } = lucide;

        function QuizApp() {
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                console.log('QuizApp mounted');
                setIsLoading(false);
            }, []);

            if (isLoading) {
                return <div className="min-h-screen bg-purple-600 flex items-center justify-center">
                    <div className="text-white text-2xl">Caricamento...</div>
                </div>;
            }

            return (
                <div className="min-h-screen bg-purple-600 flex items-center justify-center">
                    <div className="bg-white p-8 rounded-lg shadow-xl">
                        <h1 className="text-2xl font-bold text-center mb-4">Quiz App</h1>
                        <p className="text-gray-600">Se vedi questo messaggio, l'app funziona correttamente!</p>
                    </div>
                </div>
            );
        }

        // Logging per debug del rendering
        console.log('About to render QuizApp');
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuizApp />);
        
        console.log('Render complete');
    </script>
</body>
</html>
