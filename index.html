<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Esame al Ruolo Conducenti</title>
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React (versioni specifiche e stabili) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div id="root">
        <!-- Fallback content in caso React non si carichi -->
        <div style="display: none;" id="fallback">
            Se vedi questo messaggio, c'è un problema con il caricamento di React
        </div>
    </div>

    <script type="text/babel">
        // Test che React sia caricato
        console.log('React version:', React.version);
        console.log('ReactDOM version:', ReactDOM.version);

        const { useState, useEffect } = React;
        const { Play } = lucide;

        function QuizApp() {
            const [loaded, setLoaded] = useState(false);

            useEffect(() => {
                console.log('QuizApp mounted');
                setLoaded(true);
            }, []);

            return (
                <div className="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 p-4">
                    <div className="max-w-2xl mx-auto bg-white rounded-2xl shadow-2xl p-6">
                        <h1 className="text-2xl font-bold text-center mb-4">
                            Quiz App
                        </h1>
                        <div className="text-center">
                            {loaded ? (
                                <button
                                    className="bg-purple-600 text-white px-4 py-2 rounded"
                                    onClick={() => alert('React e gli eventi funzionano!')}
                                >
                                    Clicca per test
                                </button>
                            ) : (
                                <p>Caricamento...</p>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Mostra il fallback se React non si carica
        document.getElementById('fallback').style.display = 'block';

        // Rendering
        console.log('Starting render...');
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<QuizApp />);
        console.log('Render complete');
    </script>
</body>
</html>
